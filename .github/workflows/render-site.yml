name: Render Site

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-site:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install R packages
        run: Rscript -e "install.packages(c('rmarkdown','scholar','data.table'), repos='https://cloud.r-project.org', Ncpus=2)"

      - name: Render site
        run: Rscript -e "rmarkdown::render_site()"

      - name: Commit rendered changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Render site"
          file_pattern: "*.html site_libs/**"
